name: container-build-and-push

on:
  workflow_call:

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project Repository
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout Containerfiles Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/containerfiles
          ref: main
          sparse-checkout: |
            ${{ vars.REPOSITORY_LANGUAGE }}
          sparse-checkout-cone-mode: false
          path: containerfiles

      - name: Check if `env.list` Exists
        run: |
          tree
          if [ ! -f "project/env.list" ]; then
            echo "env.list not found, creating an empty file..."
            touch project/env.list
          fi

      - name: Log in to Quay
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ vars.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_PASSWORD }}
          registry: ${{ vars.QUAY_DOMAIN }}

      - name: Login to Docker Hub to download images
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set tags
        id: tags
        run: |
          cd project
          sha_short=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%d)
          echo "sha_short=$sha_short" >> $GITHUB_OUTPUT
          echo "date=$date" >> $GITHUB_OUTPUT

      - name: Build amd64
        if: ${{ steps.tags.outputs.sha_short != '' }}
        id: build-amd64
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056  # v2
        with:
          image: ${{ github.event.repository.name }}-amd64
          tags: latest
          containerfiles: |
            containerfiles/${{ vars.REPOSITORY_LANGUAGE }}/Containerfile
          build-args: |
            LANGUAGE_VERSION=${{ vars.REPOSITORY_LANGUAGE_VERSION }}
            APP_NAME=${{ vars.APP_NAME }}
            BUILD_FLAGS=${{ vars.BUILD_FLAGS }}
            ENV_FILE=env.list
          context: project/${{ vars.REPOSITORY_SOURCE_PATH }}
          oci: true
          extra-args: |
            --no-cache
            --platform linux/amd64

      - name: Build arm64
        if: ${{ steps.tags.outputs.sha_short != '' }}
        id: build-arm64
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056  # v2
        with:
          image: ${{ github.event.repository.name }}-arm64
          tags: latest
          containerfiles: |
            containerfiles/${{ vars.REPOSITORY_LANGUAGE }}/Containerfile
          build-args: |
            LANGUAGE_VERSION=${{ vars.REPOSITORY_LANGUAGE_VERSION }}
            APP_NAME=${{ vars.APP_NAME }}
            BUILD_FLAGS=${{ vars.BUILD_FLAGS }}
            ENV_FILE=env.list
          context: project/${{ vars.REPOSITORY_SOURCE_PATH }}
          oci: true
          extra-args: |
            --no-cache
            --platform linux/arm64

      - name: Create and push manifest
        if: ${{ steps.tags.outputs.sha_short != '' }}
        run: |
          IMAGE=${{ vars.QUAY_DOMAIN }}/${{ github.repository_owner }}/${{ github.event.repository.name }}
          SHA=${{ steps.tags.outputs.sha_short }}
          DATE=${{ steps.tags.outputs.date }}

          buildah manifest create $IMAGE:latest
          buildah manifest add $IMAGE:latest ${{ steps.build-amd64.outputs.image-with-tag }}
          buildah manifest add $IMAGE:latest ${{ steps.build-arm64.outputs.image-with-tag }}

          buildah manifest push --all $IMAGE:latest docker://$IMAGE:latest
          buildah manifest push --all $IMAGE:latest docker://$IMAGE:$DATE-$SHA
